name: Daily TEFAS+KAP refresh

on:
  schedule:
    # Her gün 06:00 UTC = 09:00 TR (yaz/kış aynı, TR UTC+3)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade --force-reinstall -r requirements.txt
      - run: python -c "import supabase; print('supabase version:', supabase.__version__)"
      - run: python scripts/daily_update.py
